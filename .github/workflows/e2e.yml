name: E2E UI Testing - Karir

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist

      - name: Start Xvfb (Virtual Framebuffer for Headless Browser Testing)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run E2E Tests in Parallel
        run: |
          # Ditambahkan argumen HTML report agar ter-generate secara sebaris
          HEADLESS=true python -m pytest src/tests/test_registration.py -n 5 -v --html=report.html --self-contained-html

      - name: Upload Test Report (Artifact)
        uses: actions/upload-artifact@v4
         # Memastikan laporan tetap di-upload meskipun ada test yang gagal
        if: always()
        with:
          name: e2e-test-report
          path: report.html