name: E2E UI Testing - Karir

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist

      - name: Start Xvfb (Virtual Framebuffer for Headless Browser Testing)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run E2E Tests in Parallel
        env:
          HEADLESS: ${{ env.HEADLESS }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          # Ditambahkan argumen HTML report agar ter-generate secara sebaris
          python -m pytest src/tests/test_registration.py src/tests/test_login.py src/tests/test_search.py -n 5 -v --html=report.html

      - name: Upload Test Report (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: |
            report.html
            assets/
            public/screenshots/

      - name: Prepare files for GitHub Pages
        if: always()
        run: |
          mkdir -p public_html
          cp report.html public_html/index.html
          cp -r assets public_html/ 2>/dev/null || true
          cp -r public public_html/ 2>/dev/null || true

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html